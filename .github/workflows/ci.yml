name: CI Pipeline

# Trigger the workflow when a PR is opened against the main branch
on:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    # This creates 3 parallel jobs for Node 18, 20, and 22
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      # Step 1: Download the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the specific Node version from the matrix
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: false #'npm' # This simple flag uses actions/cache under the hood!

      # Step 3: Install dependencies cleanly
      - name: Install Dependencies
        run: npm install

      # Step 4: Run the linter
      - name: Run Linter
        run: npm run lint

      # Step 5: Run tests (Injecting a secure API key just for the test environment)
      - name: Run Tests
        run: npm run test
        env:
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}

      # Step 6: Ensure the app actually builds
      - name: Build Application
        run: npm run build